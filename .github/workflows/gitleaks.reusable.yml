name: gitleaks (reusable)

# Reusable secret scan. Call via
# `uses: Per-Paulsen/ci-workflows/.github/workflows/gitleaks.reusable.yml@main`.

on:
  workflow_call: {}

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so the diff can be scanned
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Personal / public repos need no GITLEAKS_LICENSE.
